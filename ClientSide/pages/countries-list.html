<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Countries - Countries App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-container">
        <div id="alertBox"></div>

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 class="page-title">Countries</h1>
            <a id="addCountryBtn" class="btn" href="country-form.html">+ Add Country</a>
        </div>

        <form id="searchForm" class="card">
            <div class="filters-bar">
                <div class="form-row">
                    <label for="nameSearch">Name</label>
                    <input type="text" id="nameSearch" placeholder="e.g. Israel">
                </div>
                <div class="form-row">
                    <label for="regionFilter">Region</label>
                    <select id="regionFilter"><option value="">All regions</option></select>
                </div>
                <div class="form-row">
                    <label for="languageFilter">Language</label>
                    <input type="text" id="languageFilter" placeholder="e.g. English">
                </div>
                <div class="form-row">
                    <label for="currencyFilter">Currency</label>
                    <input type="text" id="currencyFilter" placeholder="e.g. Euro">
                </div>
                <div class="form-row">
                    <label for="minPopulation">Min population</label>
                    <input type="number" id="minPopulation" min="0">
                </div>
                <div class="form-row">
                    <label for="maxPopulation">Max population</label>
                    <input type="number" id="maxPopulation" min="0">
                </div>
                <div class="form-row">
                    <label for="minArea">Min area (km&sup2;)</label>
                    <input type="number" id="minArea" min="0">
                </div>
                <div class="form-row">
                    <label for="maxArea">Max area (km&sup2;)</label>
                    <input type="number" id="maxArea" min="0">
                </div>
                <div class="form-row">
                    <label for="sortBy">Sort by</label>
                    <select id="sortBy">
                        <option value="">None</option>
                        <option value="commonName">Name</option>
                        <option value="population">Population</option>
                        <option value="area">Area</option>
                        <option value="region">Region</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="sortDir">Direction</label>
                    <select id="sortDir">
                        <option value="asc">Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                </div>
            </div>
            <div class="filters-actions" style="margin-top:10px;">
                <button type="submit" class="btn">Search</button>
                <button type="button" id="resetFiltersBtn" class="btn btn-outline">Reset</button>
            </div>
        </form>

        <div id="countriesGrid" class="country-grid"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/mockData.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/countries.js"></script>
</body>
</html>
