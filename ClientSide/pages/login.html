<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Countries App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-container">
        <div id="alertBox"></div>

        <div class="card auth-card">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-row">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p class="muted" style="margin-top:14px;">
                No account yet? <a href="register.html">Register here</a>.
            </p>
            <p class="muted">Demo users: admin@test.com / admin123 (admin), test@test.com / 123456 (user).</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/mockData.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script>
        $(function () {
            // If already logged in, no need to see the login page again
            if (Auth.isLoggedIn()) {
                window.location.href = "countries-list.html";
            }

            $("#loginForm").on("submit", function (e) {
                e.preventDefault();
                const credentials = {
                    email: $("#email").val().trim(),
                    password: $("#password").val()
                };

                Auth.login(credentials)
                    .done(function () {
                        window.location.href = "countries-list.html";
                    })
                    .fail(Common.showError);
            });
        });
    </script>
</body>
</html>
