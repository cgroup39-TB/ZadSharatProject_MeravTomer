<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Countries App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-container">
        <div id="alertBox"></div>

        <div class="card auth-card">
            <h2>Register</h2>
            <form id="registerForm">
                <div class="form-row">
                    <label for="name">Full name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-row">
                    <label for="password">Password</label>
                    <input type="password" id="password" minlength="6" required>
                </div>
                <div class="form-row">
                    <label for="confirmPassword">Confirm password</label>
                    <input type="password" id="confirmPassword" minlength="6" required>
                </div>
                <button type="submit" class="btn">Create account</button>
            </form>
            <p class="muted" style="margin-top:14px;">
                Already have an account? <a href="login.html">Login here</a>.
            </p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/mockData.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script>
        $(function () {
            $("#registerForm").on("submit", function (e) {
                e.preventDefault();

                const password = $("#password").val();
                if (password !== $("#confirmPassword").val()) {
                    Common.showAlert("Passwords do not match.", "error");
                    return;
                }

                const userData = {
                    name: $("#name").val().trim(),
                    email: $("#email").val().trim(),
                    password: password
                };

                Auth.register(userData)
                    .done(function () {
                        Common.showAlert("Account created. You can now log in.", "success");
                        setTimeout(function () { window.location.href = "login.html"; }, 1200);
                    })
                    .fail(Common.showError);
            });
        });
    </script>
</body>
</html>
