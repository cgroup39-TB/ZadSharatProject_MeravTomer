<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Countries App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-container">
        <div id="alertBox"></div>

        <div id="quizPlayArea" class="card">
            <div class="quiz-header">
                <h2 id="quizTitle">Quiz</h2>
                <span id="timerDisplay">60s</span>
            </div>
            <p id="questionProgress" class="muted"></p>
            <h3 id="questionText"></h3>
            <div id="optionsList"></div>

            <div class="card-actions">
                <button id="nextBtn" class="btn" type="button">Next</button>
                <button id="submitQuizBtn" class="btn" type="button" style="display:none;">Submit</button>
            </div>
        </div>

        <div id="quizResults" class="card" style="display:none;"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/mockData.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/quizzes.js"></script>
</body>
</html>
